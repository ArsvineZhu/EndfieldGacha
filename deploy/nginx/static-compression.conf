# Nginx static compression template for EndfieldGacha
# Requires ngx_brotli module for brotli directives.

# Ensure mime types are loaded in nginx.conf:
# include       mime.types;

# Enable dynamic compression
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml;

brotli on;
brotli_comp_level 6;
brotli_min_length 1024;
brotli_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml;

# Prefer pre-compressed assets generated by build/compress.py
# (foo.js.br / foo.js.gz)
gzip_static on;
brotli_static on;

server {
    listen 80;
    server_name _;

    root /path/to/EndfieldGacha;

    location /static/ {
        alias /path/to/EndfieldGacha/dist/static/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
